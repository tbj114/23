<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxaltyX - 专业统计分析软件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #1890ff;
            --primary-light: #40a9ff;
            --primary-dark: #096dd9;
            --secondary: #722ed1;
            --success: #52c41a;
            --warning: #faad14;
            --error: #ff4d4f;
            --info: #13c2c2;
            --text-primary: #262626;
            --text-secondary: #595959;
            --text-tertiary: #8c8c8c;
            --background: #f5f5f5;
            --card-bg: #ffffff;
            --border: #e8e8e8;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.09);
            --shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.15);
            --border-radius: 4px;
            --transition: all 0.3s cubic-bezier(0.645, 0.045, 0.355, 1);
        }
        
        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-primary);
            line-height: 1.5;
        }
        
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        /* 顶部菜单栏 */
        .menu-bar {
            height: 32px;
            background-color: #f0f0f0;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-size: 12px;
        }
        
        .menu-item {
            margin-right: 24px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
        }
        
        .menu-item:hover {
            background-color: rgba(24, 144, 255, 0.1);
        }
        
        /* 工具栏 */
        .toolbar {
            height: 44px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
        }
        
        .tool-group {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: var(--border-radius);
            background-color: #f5f5f5;
        }
        
        .tool-btn {
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            background-color: var(--card-bg);
            cursor: pointer;
            font-size: 12px;
            transition: var(--transition);
        }
        
        .tool-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        /* 主工作区 */
        .main-workspace {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        /* 左侧边栏 */
        .sidebar {
            width: 200px;
            background-color: var(--card-bg);
            border-right: 1px solid var(--border);
            padding: 16px;
            overflow-y: auto;
        }
        
        .sidebar-section {
            margin-bottom: 24px;
        }
        
        .sidebar-section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .sidebar-item {
            padding: 6px 12px;
            margin-bottom: 2px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .sidebar-item:hover {
            background-color: rgba(24, 144, 255, 0.08);
            color: var(--primary);
        }
        
        .sidebar-item.active {
            background-color: var(--primary);
            color: white;
        }
        
        /* 中央工作区 */
        .central-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 标签页 */
        .tabs {
            height: 32px;
            background-color: #f5f5f5;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 4px;
        }
        
        .tab {
            padding: 6px 16px;
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            background-color: var(--card-bg);
            cursor: pointer;
            font-size: 12px;
            transition: var(--transition);
        }
        
        .tab:hover {
            background-color: #f0f0f0;
        }
        
        .tab.active {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--card-bg);
            margin-bottom: -1px;
        }
        
        /* 数据表格区域 */
        .data-area {
            flex: 1;
            background-color: var(--card-bg);
            overflow: auto;
            position: relative;
        }
        
        .data-table-container {
            padding: 16px;
        }
        
        /* 专业数据表格 */
        .data-table {
            width: auto;
            border-collapse: collapse;
            font-size: 12px;
        }
        
        .data-table th,
        .data-table td {
            padding: 6px 8px;
            border: 1px solid var(--border);
            text-align: center;
            min-width: 80px;
            height: 24px;
        }
        
        .data-table th {
            background-color: #f0f0f0;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .data-table .row-header {
            background-color: #f0f0f0;
            font-weight: 600;
            position: sticky;
            left: 0;
            z-index: 5;
        }
        
        .data-table td {
            background-color: white;
        }
        
        .data-table td:hover {
            background-color: rgba(24, 144, 255, 0.05);
        }
        
        .data-table input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 12px;
            padding: 2px;
            outline: none;
        }
        
        .data-table input:focus {
            background-color: rgba(24, 144, 255, 0.1);
        }
        
        /* 右侧属性面板 */
        .properties-panel {
            width: 280px;
            background-color: var(--card-bg);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        .properties-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
        }
        
        .properties-content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }
        
        .property-group {
            margin-bottom: 20px;
        }
        
        .property-group-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
            margin-bottom: 8px;
        }
        
        .property-item {
            margin-bottom: 12px;
        }
        
        .property-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        
        .property-input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            font-size: 12px;
        }
        
        .property-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
        }
        
        /* 状态栏 */
        .status-bar {
            height: 24px;
            background-color: #f0f0f0;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-size: 11px;
            color: var(--text-tertiary);
        }
        
        .status-item {
            margin-right: 24px;
        }
        
        /* 分析结果面板 */
        .analysis-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 300px;
            background-color: var(--card-bg);
            border-top: 1px solid var(--border);
            display: none;
            flex-direction: column;
        }
        
        .analysis-panel.active {
            display: flex;
        }
        
        .analysis-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .analysis-title {
            font-size: 14px;
            font-weight: 600;
        }
        
        .analysis-close {
            cursor: pointer;
            padding: 4px;
            border-radius: 2px;
        }
        
        .analysis-close:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }
        
        .analysis-content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }
        
        /* 按钮样式 */
        .btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            background-color: var(--card-bg);
            cursor: pointer;
            transition: var(--transition);
            font-size: 12px;
        }
        
        .btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: var(--primary-light);
            border-color: var(--primary-light);
        }
        
        /* 消息提示 */
        .message {
            padding: 8px 12px;
            border-radius: var(--border-radius);
            margin-bottom: 12px;
            font-size: 12px;
        }
        
        .message.success {
            background-color: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #52c41a;
        }
        
        .message.error {
            background-color: #fff1f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
        }
        
        /* 加载动画 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100px;
        }
        
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 下拉菜单 */
        .dropdown {
            position: relative;
            display: inline-block;
        }
        
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: var(--card-bg);
            min-width: 160px;
            box-shadow: var(--shadow);
            z-index: 100;
            border-radius: var(--border-radius);
            overflow: hidden;
        }
        
        .dropdown-content a {
            color: var(--text-primary);
            padding: 8px 12px;
            text-decoration: none;
            display: block;
            font-size: 12px;
        }
        
        .dropdown-content a:hover {
            background-color: rgba(24, 144, 255, 0.1);
        }
        
        .dropdown:hover .dropdown-content {
            display: block;
        }
        
        /* 响应式设计 */
        @media (max-width: 1200px) {
            .properties-panel {
                width: 240px;
            }
        }
        
        @media (max-width: 992px) {
            .sidebar {
                width: 180px;
            }
            
            .properties-panel {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 顶部菜单栏 -->
        <div class="menu-bar">
            <div class="menu-item">文件</div>
            <div class="menu-item">编辑</div>
            <div class="menu-item">视图</div>
            <div class="menu-item">数据</div>
            <div class="menu-item">分析</div>
            <div class="menu-item">绘图</div>
            <div class="menu-item">工具</div>
            <div class="menu-item">帮助</div>
        </div>
        
        <!-- 工具栏 -->
        <div class="toolbar">
            <div class="tool-group">
                <button class="tool-btn" title="新建">新建</button>
                <button class="tool-btn" title="打开">打开</button>
                <button class="tool-btn" title="保存">保存</button>
            </div>
            <div class="tool-group">
                <button class="tool-btn" title="剪切">剪切</button>
                <button class="tool-btn" title="复制">复制</button>
                <button class="tool-btn" title="粘贴">粘贴</button>
            </div>
            <div class="tool-group">
                <button class="tool-btn" title="导入数据">导入</button>
                <button class="tool-btn" title="导出数据">导出</button>
            </div>
            <div class="tool-group">
                <button class="tool-btn" title="变量视图">变量视图</button>
                <button class="tool-btn" title="数据视图">数据视图</button>
            </div>
        </div>
        
        <!-- 主工作区 -->
        <div class="main-workspace">
            <!-- 左侧边栏 -->
            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-section-title">分析</div>
                    <div class="sidebar-item" data-section="descriptive">描述性统计</div>
                    <div class="sidebar-item" data-section="compare_means">比较均值</div>
                    <div class="sidebar-item" data-section="correlate">相关</div>
                    <div class="sidebar-item" data-section="regression">回归</div>
                    <div class="sidebar-item" data-section="anova">方差分析</div>
                    <div class="sidebar-item" data-section="nonparametric">非参数检验</div>
                    <div class="sidebar-item" data-section="survival">生存分析</div>
                    <div class="sidebar-item" data-section="time_series">时间序列</div>
                    <div class="sidebar-item" data-section="machine_learning">机器学习</div>
                </div>
                
                <div class="sidebar-section">
                    <div class="sidebar-section-title">绘图</div>
                    <div class="sidebar-item" data-section="charts">图表</div>
                    <div class="sidebar-item" data-section="interactive">交互式可视化</div>
                </div>
                
                <div class="sidebar-section">
                    <div class="sidebar-section-title">实用程序</div>
                    <div class="sidebar-item" data-section="data_prep">数据准备</div>
                    <div class="sidebar-item" data-section="transform">转换</div>
                    <div class="sidebar-item" data-section="reports">报告</div>
                </div>
            </div>
            
            <!-- 中央工作区 -->
            <div class="central-workspace">
                <!-- 标签页 -->
                <div class="tabs">
                    <div class="tab active" data-tab="data_view">数据视图</div>
                    <div class="tab" data-tab="variable_view">变量视图</div>
                    <div class="tab" data-tab="output">输出</div>
                </div>
                
                <!-- 数据表格区域 -->
                <div class="data-area">
                    <!-- 数据视图 -->
                    <div id="data_view" class="tab-content active">
                        <div class="data-table-container">
                            <table class="data-table" id="data_table">
                                <thead id="table_header">
                                    <!-- 列标题将通过JavaScript生成 -->
                                </thead>
                                <tbody id="table_body">
                                    <!-- 表格数据将通过JavaScript生成 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <!-- 变量视图 -->
                    <div id="variable_view" class="tab-content" style="display: none;">
                        <div class="data-table-container">
                            <table class="data-table" id="variable_table">
                                <thead>
                                    <tr>
                                        <th>变量名</th>
                                        <th>类型</th>
                                        <th>宽度</th>
                                        <th>小数</th>
                                        <th>标签</th>
                                        <th>值</th>
                                        <th>缺失</th>
                                        <th>列</th>
                                        <th>对齐</th>
                                        <th>测量</th>
                                    </tr>
                                </thead>
                                <tbody id="variable_table_body">
                                    <!-- 变量数据将通过JavaScript生成 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <!-- 输出视图 -->
                    <div id="output" class="tab-content" style="display: none;">
                        <div class="data-table-container">
                            <div id="output_content">
                                <p style="text-align: center; color: var(--text-tertiary); margin-top: 40px;">输出将显示在这里</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 分析结果面板 -->
                <div class="analysis-panel" id="analysis_panel">
                    <div class="analysis-header">
                        <div class="analysis-title">分析结果</div>
                        <div class="analysis-close" onclick="closeAnalysisPanel()">×</div>
                    </div>
                    <div class="analysis-content" id="analysis_content">
                        <!-- 分析结果将显示在这里 -->
                    </div>
                </div>
            </div>
            
            <!-- 右侧属性面板 -->
            <div class="properties-panel">
                <div class="properties-header">属性</div>
                <div class="properties-content">
                    <div class="property-group">
                        <div class="property-group-title">数据集</div>
                        <div class="property-item">
                            <div class="property-label">名称</div>
                            <input type="text" class="property-input" id="dataset_name" value="未命名数据集">
                        </div>
                        <div class="property-item">
                            <div class="property-label">变量数</div>
                            <input type="text" class="property-input" id="variable_count" value="10" disabled>
                        </div>
                        <div class="property-item">
                            <div class="property-label">案例数</div>
                            <input type="text" class="property-input" id="case_count" value="100" disabled>
                        </div>
                    </div>
                    
                    <div class="property-group">
                        <div class="property-group-title">变量</div>
                        <div class="property-item">
                            <div class="property-label">当前变量</div>
                            <input type="text" class="property-input" id="current_variable" value="var1" disabled>
                        </div>
                        <div class="property-item">
                            <div class="property-label">变量标签</div>
                            <input type="text" class="property-input" id="variable_label" value="变量 1">
                        </div>
                        <div class="property-item">
                            <div class="property-label">变量类型</div>
                            <select class="property-input" id="variable_type">
                                <option value="numeric">数值</option>
                                <option value="string">字符串</option>
                                <option value="date">日期</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="property-group">
                        <div class="property-group-title">分析</div>
                        <button class="btn btn-primary" style="width: 100%; margin-bottom: 8px;" onclick="runAnalysis()">运行分析</button>
                        <button class="btn" style="width: 100%;" onclick="clearOutput()">清除输出</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-item">就绪</div>
            <div class="status-item">变量: 10</div>
            <div class="status-item">案例: 100</div>
            <div class="status-item">Python服务器: 运行中</div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="js/dataManager.js"></script>
    <script src="js/statsAnalyzer.js"></script>
    <script src="js/chartManager.js"></script>
    <script src="js/projectManager.js"></script>
    <script>
        // 全局变量
        let dataManager = new DataManager();
        let statsAnalyzer = new StatsAnalyzer();
        let chartManager = new ChartManager();
        let projectManager = new ProjectManager();
        let currentData = null;
        let currentTab = 'data_view';
        
        // 初始化应用
        function initApp() {
            // 创建100*100的空表格
            createEmptyTable(100, 10);
            // 初始化变量视图
            initVariableView();
            // 加载示例数据
            loadSampleData();
        }
        
        // 创建空表格
        function createEmptyTable(rows, cols) {
            const tableHeader = document.getElementById('table_header');
            const tableBody = document.getElementById('table_body');
            
            // 清空表格
            tableHeader.innerHTML = '';
            tableBody.innerHTML = '';
            
            // 创建表头
            const headerRow = document.createElement('tr');
            // 添加行号列
            const rowHeaderTh = document.createElement('th');
            rowHeaderTh.textContent = '';
            rowHeaderTh.style.backgroundColor = '#e0e0e0';
            headerRow.appendChild(rowHeaderTh);
            
            // 添加列标题
            for (let i = 1; i <= cols; i++) {
                const th = document.createElement('th');
                const input = document.createElement('input');
                input.type = 'text';
                input.value = `var${i}`;
                input.onchange = function() {
                    updateVariableName(i-1, this.value);
                };
                th.appendChild(input);
                headerRow.appendChild(th);
            }
            tableHeader.appendChild(headerRow);
            
            // 创建表格内容
            for (let i = 1; i <= rows; i++) {
                const row = document.createElement('tr');
                
                // 添加行号
                const rowHeaderTd = document.createElement('td');
                rowHeaderTd.className = 'row-header';
                const rowInput = document.createElement('input');
                rowInput.type = 'text';
                rowInput.value = i;
                rowInput.onchange = function() {
                    updateRowName(i-1, this.value);
                };
                rowHeaderTd.appendChild(rowInput);
                row.appendChild(rowHeaderTd);
                
                // 添加单元格
                for (let j = 1; j <= cols; j++) {
                    const td = document.createElement('td');
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = '';
                    input.onchange = function() {
                        updateCellValue(i-1, j-1, this.value);
                    };
                    td.appendChild(input);
                    row.appendChild(td);
                }
                tableBody.appendChild(row);
            }
        }
        
        // 初始化变量视图
        function initVariableView() {
            const variableTableBody = document.getElementById('variable_table_body');
            variableTableBody.innerHTML = '';
            
            for (let i = 1; i <= 10; i++) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="text" value="var${i}" onchange="updateVariableNameInView(${i-1}, this.value)"></td>
                    <td><select><option value="numeric">数值</option><option value="string">字符串</option><option value="date">日期</option></select></td>
                    <td><input type="number" value="8" min="1"></td>
                    <td><input type="number" value="2" min="0"></td>
                    <td><input type="text" value="变量 ${i}"></td>
                    <td><input type="text" value=""></td>
                    <td><input type="text" value=""></td>
                    <td><input type="number" value="${i}" min="1"></td>
                    <td><select><option value="right">右</option><option value="left">左</option><option value="center">中</option></select></td>
                    <td><select><option value="scale">度量</option><option value="ordinal">有序</option><option value="nominal">名义</option></select></td>
                `;
                variableTableBody.appendChild(row);
            }
        }
        
        // 更新变量名
        function updateVariableName(index, name) {
            // 更新表头中的变量名
            const headers = document.querySelectorAll('#table_header th input');
            if (headers[index+1]) {
                headers[index+1].value = name;
            }
            
            // 更新变量视图中的变量名
            const variableRows = document.querySelectorAll('#variable_table_body tr');
            if (variableRows[index]) {
                const input = variableRows[index].querySelector('td:first-child input');
                if (input) {
                    input.value = name;
                }
            }
        }
        
        // 更新变量视图中的变量名
        function updateVariableNameInView(index, name) {
            // 更新表头中的变量名
            const headers = document.querySelectorAll('#table_header th input');
            if (headers[index+1]) {
                headers[index+1].value = name;
            }
        }
        
        // 更新行名
        function updateRowName(index, name) {
            // 行名更新逻辑
        }
        
        // 更新单元格值
        function updateCellValue(row, col, value) {
            // 单元格值更新逻辑
            if (!currentData) {
                currentData = {};
            }
            
            const variableName = document.querySelectorAll('#table_header th input')[col+1].value;
            if (!currentData[variableName]) {
                currentData[variableName] = Array(100).fill('');
            }
            currentData[variableName][row] = value;
        }
        
        // 加载示例数据
        function loadSampleData() {
            const sampleData = {
                'ID': Array.from({length: 100}, (_, i) => i+1),
                '年龄': Array.from({length: 100}, () => Math.floor(Math.random() * 30) + 20),
                '性别': Array.from({length: 100}, () => Math.random() > 0.5 ? '男' : '女'),
                '得分': Array.from({length: 100}, () => Math.floor(Math.random() * 30) + 70),
                '组别': Array.from({length: 100}, () => ['A', 'B', 'C'][Math.floor(Math.random() * 3)]),
                '身高': Array.from({length: 100}, () => (Math.random() * 30 + 150).toFixed(1)),
                '体重': Array.from({length: 100}, () => (Math.random() * 30 + 50).toFixed(1)),
                'BMI': Array.from({length: 100}, () => (Math.random() * 10 + 18).toFixed(2)),
                '成绩': Array.from({length: 100}, () => Math.floor(Math.random() * 40) + 60),
                '排名': Array.from({length: 100}, (_, i) => i+1)
            };
            
            currentData = sampleData;
            updateTableFromData(sampleData);
            updateVariableViewFromData(sampleData);
            
            // 加载数据到Python统计引擎
            statsAnalyzer.loadData(sampleData);
        }
        
        // 从数据更新表格
        function updateTableFromData(data) {
            const variables = Object.keys(data);
            const rowCount = data[variables[0]].length;
            
            // 更新表头
            const tableHeader = document.getElementById('table_header');
            tableHeader.innerHTML = '';
            
            const headerRow = document.createElement('tr');
            // 添加行号列
            const rowHeaderTh = document.createElement('th');
            rowHeaderTh.textContent = '';
            rowHeaderTh.style.backgroundColor = '#e0e0e0';
            headerRow.appendChild(rowHeaderTh);
            
            // 添加列标题
            variables.forEach((variable, index) => {
                const th = document.createElement('th');
                const input = document.createElement('input');
                input.type = 'text';
                input.value = variable;
                input.onchange = function() {
                    updateVariableName(index, this.value);
                };
                th.appendChild(input);
                headerRow.appendChild(th);
            });
            tableHeader.appendChild(headerRow);
            
            // 更新表格内容
            const tableBody = document.getElementById('table_body');
            tableBody.innerHTML = '';
            
            for (let i = 0; i < rowCount; i++) {
                const row = document.createElement('tr');
                
                // 添加行号
                const rowHeaderTd = document.createElement('td');
                rowHeaderTd.className = 'row-header';
                const rowInput = document.createElement('input');
                rowInput.type = 'text';
                rowInput.value = i+1;
                rowInput.onchange = function() {
                    updateRowName(i, this.value);
                };
                rowHeaderTd.appendChild(rowInput);
                row.appendChild(rowHeaderTd);
                
                // 添加单元格
                variables.forEach(variable => {
                    const td = document.createElement('td');
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = data[variable][i];
                    input.onchange = function() {
                        updateCellValue(i, variables.indexOf(variable), this.value);
                    };
                    td.appendChild(input);
                    row.appendChild(td);
                });
                tableBody.appendChild(row);
            }
            
            // 更新状态栏
            document.querySelector('.status-item:nth-child(2)').textContent = `变量: ${variables.length}`;
            document.querySelector('.status-item:nth-child(3)').textContent = `案例: ${rowCount}`;
            document.getElementById('variable_count').value = variables.length;
            document.getElementById('case_count').value = rowCount;
        }
        
        // 从数据更新变量视图
        function updateVariableViewFromData(data) {
            const variables = Object.keys(data);
            const variableTableBody = document.getElementById('variable_table_body');
            variableTableBody.innerHTML = '';
            
            variables.forEach((variable, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="text" value="${variable}" onchange="updateVariableNameInView(${index}, this.value)"></td>
                    <td><select><option value="numeric">数值</option><option value="string">字符串</option><option value="date">日期</option></select></td>
                    <td><input type="number" value="8" min="1"></td>
                    <td><input type="number" value="2" min="0"></td>
                    <td><input type="text" value="${variable}"></td>
                    <td><input type="text" value=""></td>
                    <td><input type="text" value=""></td>
                    <td><input type="number" value="${index+1}" min="1"></td>
                    <td><select><option value="right">右</option><option value="left">左</option><option value="center">中</option></select></td>
                    <td><select><option value="scale">度量</option><option value="ordinal">有序</option><option value="nominal">名义</option></select></td>
                `;
                variableTableBody.appendChild(row);
            });
        }
        
        // 切换标签页
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                // 移除所有active类
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(content => content.style.display = 'none');
                
                // 添加active类到当前标签页
                this.classList.add('active');
                const tabId = this.getAttribute('data-tab');
                document.getElementById(tabId).style.display = 'block';
                currentTab = tabId;
            });
        });
        
        // 切换侧边栏项
        document.querySelectorAll('.sidebar-item').forEach(item => {
            item.addEventListener('click', function() {
                // 移除所有active类
                document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
                // 添加active类到当前项
                this.classList.add('active');
                
                // 显示分析面板
                const section = this.getAttribute('data-section');
                showAnalysisPanel(section);
            });
        });
        
        // 显示分析面板
        function showAnalysisPanel(section) {
            const analysisPanel = document.getElementById('analysis_panel');
            const analysisContent = document.getElementById('analysis_content');
            
            analysisPanel.classList.add('active');
            
            // 根据选择的分析类型显示不同的内容
            let content = '';
            switch (section) {
                case 'descriptive':
                    content = `
                        <h3>描述性统计</h3>
                        <div style="margin-bottom: 16px;">
                            <label style="display: block; margin-bottom: 8px;">选择变量:</label>
                            <select multiple style="width: 100%; height: 120px;">
                                ${currentData ? Object.keys(currentData).map(varName => `<option value="${varName}">${varName}</option>`).join('') : ''}
                            </select>
                        </div>
                        <div style="margin-bottom: 16px;">
                            <label style="display: block; margin-bottom: 8px;">统计量:</label>
                            <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                                <label><input type="checkbox" checked> 均值</label>
                                <label><input type="checkbox" checked> 标准差</label>
                                <label><input type="checkbox" checked> 最小值</label>
                                <label><input type="checkbox" checked> 最大值</label>
                                <label><input type="checkbox"> 偏度</label>
                                <label><input type="checkbox"> 峰度</label>
                            </div>
                        </div>
                        <button class="btn btn-primary" onclick="runDescriptiveAnalysis()">运行分析</button>
                    `;
                    break;
                case 'compare_means':
                    content = `
                        <h3>比较均值</h3>
                        <div style="margin-bottom: 16px;">
                            <label style="display: block; margin-bottom: 8px;">因变量:</label>
                            <select style="width: 100%;">
                                ${currentData ? Object.keys(currentData).map(varName => `<option value="${varName}">${varName}</option>`).join('') : ''}
                            </select>
                        </div>
                        <div style="margin-bottom: 16px;">
                            <label style="display: block; margin-bottom: 8px;">分组变量:</label>
                            <select style="width: 100%;">
                                ${currentData ? Object.keys(currentData).map(varName => `<option value="${varName}">${varName}</option>`).join('') : ''}
                            </select>
                        </div>
                        <button class="btn btn-primary" onclick="runCompareMeansAnalysis()">运行分析</button>
                    `;
                    break;
                case 'correlate':
                    content = `
                        <h3>相关分析</h3>
                        <div style="margin-bottom: 16px;">
                            <label style="display: block; margin-bottom: 8px;">选择变量:</label>
                            <select multiple style="width: 100%; height: 120px;">
                                ${currentData ? Object.keys(currentData).map(varName => `<option value="${varName}">${varName}</option>`).join('') : ''}
                            </select>
                        </div>
                        <div style="margin-bottom: 16px;">
                            <label style="display: block; margin-bottom: 8px;">相关系数:</label>
                            <select style="width: 100%;">
                                <option value="pearson">Pearson</option>
                                <option value="kendall">Kendall</option>
                                <option value="spearman">Spearman</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" onclick="runCorrelationAnalysis()">运行分析</button>
                    `;
                    break;
                default:
                    content = `<h3>${this.textContent}</h3><p>此功能正在开发中...</p>`;
            }
            
            analysisContent.innerHTML = content;
        }
        
        // 关闭分析面板
        function closeAnalysisPanel() {
            const analysisPanel = document.getElementById('analysis_panel');
            analysisPanel.classList.remove('active');
        }
        
        // 运行分析
        function runAnalysis() {
            // 运行分析逻辑
            alert('分析已运行');
        }
        
        // 运行描述性分析
        async function runDescriptiveAnalysis() {
            if (!currentData) {
                alert('请先加载数据');
                return;
            }
            
            const variables = Object.keys(currentData);
            
            // 显示加载动画
            document.getElementById('analysis_content').innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';
            
            try {
                // 调用统计分析器
                const response = await statsAnalyzer.descriptiveStats(variables);
                
                if (response.status === 'success') {
                    const result = response.data;
                    
                    // 显示结果
                    let html = '<h3>描述性统计结果</h3>';
                    html += '<table style="width: 100%; border-collapse: collapse; margin-top: 16px;">';
                    html += '<tr><th>统计量</th>';
                    variables.forEach(varName => {
                        html += `<th>${varName}</th>`;
                    });
                    html += '</tr>';
                    
                    const stats = ['count', 'mean', 'std', 'min', '25%', '50%', '75%', 'max'];
                    stats.forEach(stat => {
                        html += `<tr><td>${stat}</td>`;
                        variables.forEach(varName => {
                            if (result[varName] && result[varName][stat] !== undefined) {
                                html += `<td>${result[varName][stat].toFixed(2)}</td>`;
                            } else {
                                html += '<td>-</td>';
                            }
                        });
                        html += '</tr>';
                    });
                    html += '</table>';
                    
                    document.getElementById('analysis_content').innerHTML = html;
                    
                    // 同时更新输出视图
                    updateOutputView(html);
                } else {
                    document.getElementById('analysis_content').innerHTML = `<div class="message error">${response.message}</div>`;
                }
            } catch (error) {
                console.error('Error running descriptive analysis:', error);
                document.getElementById('analysis_content').innerHTML = '<div class="message error">运行分析时出错</div>';
            }
        }
        
        // 运行均值比较分析
        async function runCompareMeansAnalysis() {
            if (!currentData) {
                alert('请先加载数据');
                return;
            }
            
            // 显示加载动画
            document.getElementById('analysis_content').innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';
            
            try {
                // 模拟分析结果
                setTimeout(() => {
                    const html = '<h3>均值比较结果</h3><p>分析结果将显示在这里</p>';
                    document.getElementById('analysis_content').innerHTML = html;
                    updateOutputView(html);
                }, 1000);
            } catch (error) {
                console.error('Error running compare means analysis:', error);
                document.getElementById('analysis_content').innerHTML = '<div class="message error">运行分析时出错</div>';
            }
        }
        
        // 运行相关分析
        async function runCorrelationAnalysis() {
            if (!currentData) {
                alert('请先加载数据');
                return;
            }
            
            const variables = Object.keys(currentData);
            
            // 显示加载动画
            document.getElementById('analysis_content').innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';
            
            try {
                // 调用统计分析器
                const response = await statsAnalyzer.correlation(variables);
                
                if (response.status === 'success') {
                    const result = response.data;
                    
                    // 显示结果
                    let html = '<h3>相关分析结果</h3>';
                    html += '<table style="width: 100%; border-collapse: collapse; margin-top: 16px;">';
                    html += '<tr><th></th>';
                    variables.forEach(varName => {
                        html += `<th>${varName}</th>`;
                    });
                    html += '</tr>';
                    
                    variables.forEach(var1 => {
                        html += `<tr><td>${var1}</td>`;
                        variables.forEach(var2 => {
                            if (result[var1] && result[var1][var2] !== undefined) {
                                html += `<td>${result[var1][var2].toFixed(3)}</td>`;
                            } else {
                                html += '<td>-</td>';
                            }
                        });
                        html += '</tr>';
                    });
                    html += '</table>';
                    
                    document.getElementById('analysis_content').innerHTML = html;
                    updateOutputView(html);
                } else {
                    document.getElementById('analysis_content').innerHTML = `<div class="message error">${response.message}</div>`;
                }
            } catch (error) {
                console.error('Error running correlation analysis:', error);
                document.getElementById('analysis_content').innerHTML = '<div class="message error">运行分析时出错</div>';
            }
        }
        
        // 更新输出视图
        function updateOutputView(content) {
            const outputContent = document.getElementById('output_content');
            outputContent.innerHTML += `<div style="margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border);">${content}</div>`;
        }
        
        // 清除输出
        function clearOutput() {
            document.getElementById('output_content').innerHTML = '<p style="text-align: center; color: var(--text-tertiary); margin-top: 40px;">输出将显示在这里</p>';
        }
        
        // 初始化应用
        window.onload = initApp;
        
        // 接收来自主进程的菜单操作
        window.electronAPI.onMenuAction((event, action) => {
            console.log('Menu action:', action);
            // 处理菜单操作
            if (action === 'new-project') {
                createEmptyTable(100, 10);
            } else if (action === 'open-project') {
                alert('打开项目');
            } else if (action === 'save-project') {
                alert('保存项目');
            }
        });
    </script>
</body>
</html>
