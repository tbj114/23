<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxaltyX - 专业统计分析软件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #1890ff;
            --primary-light: #40a9ff;
            --primary-dark: #096dd9;
            --secondary: #722ed1;
            --success: #52c41a;
            --warning: #faad14;
            --error: #ff4d4f;
            --info: #13c2c2;
            --text-primary: #262626;
            --text-secondary: #595959;
            --text-tertiary: #8c8c8c;
            --background: #f0f2f5;
            --card-bg: #ffffff;
            --border: #d9d9d9;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 4px 16px rgba(0, 0, 0, 0.12);
            --border-radius: 6px;
            --transition: all 0.2s ease;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        /* 顶部菜单栏 */
        .menu-bar {
            background-color: #001529;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }
        
        .menu-bar-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo::before {
            content: "📊";
            font-size: 24px;
        }
        
        .menu-items {
            display: flex;
            gap: 4px;
        }
        
        .menu-item {
            position: relative;
        }
        
        .menu-item > button {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.85);
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            border-radius: var(--border-radius);
            transition: var(--transition);
        }
        
        .menu-item > button:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .submenu {
            position: absolute;
            top: 100%;
            left: 0;
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-hover);
            min-width: 180px;
            padding: 8px 0;
            display: none;
            z-index: 1000;
            margin-top: 4px;
        }
        
        .menu-item:hover .submenu {
            display: block;
        }
        
        .submenu-item {
            display: block;
            width: 100%;
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            transition: var(--transition);
        }
        
        .submenu-item:hover {
            background-color: var(--background);
            color: var(--primary);
        }
        
        .submenu-divider {
            height: 1px;
            background-color: var(--border);
            margin: 8px 0;
        }
        
        /* 工具栏 */
        .toolbar {
            background-color: var(--card-bg);
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .tool-group {
            display: flex;
            gap: 8px;
            padding-right: 16px;
            border-right: 1px solid var(--border);
        }
        
        .tool-group:last-child {
            border-right: none;
        }
        
        .tool-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .tool-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .tool-btn.primary {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        .tool-btn.primary:hover {
            background-color: var(--primary-light);
            border-color: var(--primary-light);
        }
        
        /* 主工作区 */
        .main-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 24px;
            gap: 24px;
        }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 8px;
            background-color: var(--card-bg);
            padding: 8px;
            border-radius: var(--border-radius);
            width: fit-content;
        }
        
        .tab {
            padding: 8px 20px;
            background: transparent;
            border: none;
            border-radius: var(--border-radius);
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .tab:hover {
            color: var(--text-primary);
        }
        
        .tab.active {
            background-color: var(--primary);
            color: white;
        }
        
        /* 数据表格区域 */
        .data-area {
            flex: 1;
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .data-table-container {
            flex: 1;
            overflow: auto;
            padding: 20px;
        }
        
        /* 专业数据表格 */
        .data-table {
            border-collapse: separate;
            border-spacing: 0;
            font-size: 13px;
            background-color: white;
        }
        
        .data-table th,
        .data-table td {
            padding: 8px 12px;
            border: 1px solid var(--border);
            text-align: center;
            min-width: 100px;
            max-width: 200px;
            height: 32px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .data-table th {
            background-color: #fafafa;
            font-weight: 600;
            color: var(--text-secondary);
            position: sticky;
            top: 0;
            z-index: 20;
        }
        
        .data-table .row-header {
            background-color: #fafafa;
            font-weight: 600;
            color: var(--text-secondary);
            position: sticky;
            left: 0;
            z-index: 10;
            min-width: 60px;
            max-width: 100px;
        }
        
        .data-table td {
            background-color: white;
        }
        
        .data-table td:hover {
            background-color: rgba(24, 144, 255, 0.05);
        }
        
        .data-table input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 13px;
            padding: 4px;
            outline: none;
            text-align: center;
        }
        
        .data-table input:focus {
            background-color: rgba(24, 144, 255, 0.1);
            border-radius: 4px;
        }
        
        /* 右侧属性面板 */
        .properties-panel {
            width: 300px;
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 20px;
            display: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .properties-panel.active {
            display: flex;
        }
        
        .properties-header {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .property-group {
            margin-bottom: 20px;
        }
        
        .property-group-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .property-item {
            margin-bottom: 16px;
        }
        
        .property-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
        }
        
        .property-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            font-size: 14px;
            transition: var(--transition);
        }
        
        .property-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.1);
        }
        
        .property-input:disabled {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }
        
        /* 状态栏 */
        .status-bar {
            background-color: var(--card-bg);
            border-top: 1px solid var(--border);
            padding: 8px 24px;
            display: flex;
            align-items: center;
            gap: 32px;
            font-size: 13px;
            color: var(--text-tertiary);
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .status-item::before {
            content: "●";
            font-size: 8px;
        }
        
        .status-item.success::before {
            color: var(--success);
        }
        
        /* 分析结果面板 */
        .analysis-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 400px;
            background-color: var(--card-bg);
            border-top: 1px solid var(--border);
            box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.1);
            display: none;
            flex-direction: column;
            z-index: 999;
        }
        
        .analysis-panel.active {
            display: flex;
        }
        
        .analysis-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fafafa;
        }
        
        .analysis-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .analysis-close {
            cursor: pointer;
            padding: 8px;
            border-radius: var(--border-radius);
            transition: var(--transition);
            font-size: 20px;
            color: var(--text-tertiary);
        }
        
        .analysis-close:hover {
            background-color: rgba(0, 0, 0, 0.05);
            color: var(--text-primary);
        }
        
        .analysis-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }
        
        /* 按钮样式 */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            background-color: var(--card-bg);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: var(--primary-light);
            border-color: var(--primary-light);
        }
        
        /* 消息提示 */
        .message {
            padding: 12px 16px;
            border-radius: var(--border-radius);
            margin-bottom: 16px;
            font-size: 14px;
        }
        
        .message.success {
            background-color: #f6ffed;
            border: 1px solid #b7eb8f;
            color: var(--success);
        }
        
        .message.error {
            background-color: #fff1f0;
            border: 1px solid #ffccc7;
            color: var(--error);
        }
        
        /* 加载动画 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 120px;
            gap: 12px;
        }
        
        .loading-spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 结果表格 */
        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 13px;
        }
        
        .result-table th,
        .result-table td {
            padding: 10px 16px;
            border: 1px solid var(--border);
            text-align: left;
        }
        
        .result-table th {
            background-color: #fafafa;
            font-weight: 600;
        }
        
        .result-table td {
            background-color: white;
        }
        
        /* 工作区布局 */
        .workspace-layout {
            display: flex;
            gap: 24px;
            flex: 1;
            overflow: hidden;
        }
        
        .workspace-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 顶部菜单栏 -->
        <div class="menu-bar">
            <div class="menu-bar-left">
                <div class="logo">AxaltyX</div>
                <div class="menu-items">
                    <div class="menu-item">
                        <button>文件</button>
                        <div class="submenu">
                            <button class="submenu-item" onclick="newProject()">新建项目</button>
                            <button class="submenu-item" onclick="openProject()">打开项目</button>
                            <button class="submenu-item" onclick="saveProject()">保存项目</button>
                            <div class="submenu-divider"></div>
                            <button class="submenu-item" onclick="importData()">导入数据</button>
                            <button class="submenu-item" onclick="exportData()">导出数据</button>
                            <div class="submenu-divider"></div>
                            <button class="submenu-item" onclick="exitApp()">退出</button>
                        </div>
                    </div>
                    <div class="menu-item">
                        <button>编辑</button>
                        <div class="submenu">
                            <button class="submenu-item" onclick="cutData()">剪切</button>
                            <button class="submenu-item" onclick="copyData()">复制</button>
                            <button class="submenu-item" onclick="pasteData()">粘贴</button>
                            <div class="submenu-divider"></div>
                            <button class="submenu-item" onclick="clearData()">清除数据</button>
                        </div>
                    </div>
                    <div class="menu-item">
                        <button>视图</button>
                        <div class="submenu">
                            <button class="submenu-item" onclick="toggleProperties()">显示/隐藏属性面板</button>
                            <button class="submenu-item" onclick="resetLayout()">重置布局</button>
                        </div>
                    </div>
                    <div class="menu-item">
                        <button>数据</button>
                        <div class="submenu">
                            <button class="submenu-item" onclick="defineVariables()">定义变量</button>
                            <button class="submenu-item" onclick="transformData()">转换数据</button>
                            <button class="submenu-item" onclick="cleanData()">数据清洗</button>
                        </div>
                    </div>
                    <div class="menu-item">
                        <button>分析</button>
                        <div class="submenu">
                            <button class="submenu-item" onclick="showAnalysis('descriptive')">描述性统计</button>
                            <button class="submenu-item" onclick="showAnalysis('frequency')">频数分析</button>
                            <button class="submenu-item" onclick="showAnalysis('compare_means')">比较均值</button>
                            <button class="submenu-item" onclick="showAnalysis('correlate')">相关分析</button>
                            <button class="submenu-item" onclick="showAnalysis('regression')">回归分析</button>
                            <button class="submenu-item" onclick="showAnalysis('anova')">方差分析</button>
                            <button class="submenu-item" onclick="showAnalysis('nonparametric')">非参数检验</button>
                            <button class="submenu-item" onclick="showAnalysis('survival')">生存分析</button>
                            <button class="submenu-item" onclick="showAnalysis('time_series')">时间序列分析</button>
                            <button class="submenu-item" onclick="showAnalysis('machine_learning')">机器学习</button>
                        </div>
                    </div>
                    <div class="menu-item">
                        <button>绘图</button>
                        <div class="submenu">
                            <button class="submenu-item" onclick="showAnalysis('charts')">基础图表</button>
                            <button class="submenu-item" onclick="showAnalysis('interactive')">交互式可视化</button>
                        </div>
                    </div>
                    <div class="menu-item">
                        <button>工具</button>
                        <div class="submenu">
                            <button class="submenu-item" onclick="showAnalysis('data_prep')">数据准备</button>
                            <button class="submenu-item" onclick="showAnalysis('reports')">报告生成</button>
                            <div class="submenu-divider"></div>
                            <button class="submenu-item" onclick="showSettings()">设置</button>
                        </div>
                    </div>
                    <div class="menu-item">
                        <button>帮助</button>
                        <div class="submenu">
                            <button class="submenu-item" onclick="showHelp()">帮助文档</button>
                            <button class="submenu-item" onclick="showTutorial()">教程</button>
                            <div class="submenu-divider"></div>
                            <button class="submenu-item" onclick="showAbout()">关于</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 工具栏 -->
        <div class="toolbar">
            <div class="tool-group">
                <button class="tool-btn" onclick="newProject()">📄 新建</button>
                <button class="tool-btn" onclick="openProject()">📂 打开</button>
                <button class="tool-btn primary" onclick="saveProject()">💾 保存</button>
            </div>
            <div class="tool-group">
                <button class="tool-btn" onclick="cutData()">✂️ 剪切</button>
                <button class="tool-btn" onclick="copyData()">📋 复制</button>
                <button class="tool-btn" onclick="pasteData()">📌 粘贴</button>
            </div>
            <div class="tool-group">
                <button class="tool-btn" onclick="importData()">📥 导入</button>
                <button class="tool-btn" onclick="exportData()">📤 导出</button>
            </div>
            <div class="tool-group">
                <button class="tool-btn" onclick="switchToVariableView()">📊 变量视图</button>
                <button class="tool-btn" onclick="switchToDataView()">📈 数据视图</button>
            </div>
            <div class="tool-group">
                <button class="tool-btn primary" onclick="showAnalysis('descriptive')">🔍 快速分析</button>
            </div>
        </div>
        
        <!-- 主工作区 -->
        <div class="main-workspace">
            <!-- 标签页 -->
            <div class="tabs">
                <button class="tab active" data-tab="data_view" onclick="switchTab('data_view')">数据视图</button>
                <button class="tab" data-tab="variable_view" onclick="switchTab('variable_view')">变量视图</button>
                <button class="tab" data-tab="output" onclick="switchTab('output')">输出</button>
            </div>
            
            <div class="workspace-layout">
                <!-- 中央工作区 -->
                <div class="workspace-main">
                    <!-- 数据表格区域 -->
                    <div class="data-area">
                        <!-- 数据视图 -->
                        <div id="data_view" class="tab-content active">
                            <div class="data-table-container">
                                <table class="data-table" id="data_table">
                                    <thead id="table_header">
                                    </thead>
                                    <tbody id="table_body">
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        
                        <!-- 变量视图 -->
                        <div id="variable_view" class="tab-content" style="display: none;">
                            <div class="data-table-container">
                                <table class="data-table" id="variable_table">
                                    <thead>
                                        <tr>
                                            <th>变量名</th>
                                            <th>类型</th>
                                            <th>宽度</th>
                                            <th>小数</th>
                                            <th>标签</th>
                                            <th>值</th>
                                            <th>缺失</th>
                                            <th>列</th>
                                            <th>对齐</th>
                                            <th>测量</th>
                                        </tr>
                                    </thead>
                                    <tbody id="variable_table_body">
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        
                        <!-- 输出视图 -->
                        <div id="output" class="tab-content" style="display: none;">
                            <div class="data-table-container">
                                <div id="output_content">
                                    <p style="text-align: center; color: var(--text-tertiary); margin-top: 60px; font-size: 14px;">输出将显示在这里</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 右侧属性面板 -->
                <div class="properties-panel" id="properties_panel">
                    <div class="properties-header">属性</div>
                    <div class="properties-content">
                        <div class="property-group">
                            <div class="property-group-title">数据集</div>
                            <div class="property-item">
                                <label class="property-label">名称</label>
                                <input type="text" class="property-input" id="dataset_name" value="未命名数据集">
                            </div>
                            <div class="property-item">
                                <label class="property-label">变量数</label>
                                <input type="text" class="property-input" id="variable_count" value="10" disabled>
                            </div>
                            <div class="property-item">
                                <label class="property-label">案例数</label>
                                <input type="text" class="property-input" id="case_count" value="100" disabled>
                            </div>
                        </div>
                        
                        <div class="property-group">
                            <div class="property-group-title">变量</div>
                            <div class="property-item">
                                <label class="property-label">当前变量</label>
                                <input type="text" class="property-input" id="current_variable" value="var1" disabled>
                            </div>
                            <div class="property-item">
                                <label class="property-label">变量标签</label>
                                <input type="text" class="property-input" id="variable_label" value="变量 1">
                            </div>
                            <div class="property-item">
                                <label class="property-label">变量类型</label>
                                <select class="property-input" id="variable_type">
                                    <option value="numeric">数值</option>
                                    <option value="string">字符串</option>
                                    <option value="date">日期</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="property-group">
                            <div class="property-group-title">分析</div>
                            <button class="btn btn-primary" style="width: 100%; margin-bottom: 12px;" onclick="runAnalysis()">▶️ 运行分析</button>
                            <button class="btn" style="width: 100%;" onclick="clearOutput()">🗑️ 清除输出</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-item success">就绪</div>
            <div class="status-item">变量: <span id="status_variables">10</span></div>
            <div class="status-item">案例: <span id="status_cases">100</span></div>
            <div class="status-item success">Python服务器: 运行中</div>
        </div>
        
        <!-- 分析结果面板 -->
        <div class="analysis-panel" id="analysis_panel">
            <div class="analysis-header">
                <div class="analysis-title">分析结果</div>
                <div class="analysis-close" onclick="closeAnalysisPanel()">×</div>
            </div>
            <div class="analysis-content" id="analysis_content">
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="js/dataManager.js"></script>
    <script src="js/statsAnalyzer.js"></script>
    <script src="js/chartManager.js"></script>
    <script src="js/projectManager.js"></script>
    <script>
        console.log('Script started');
        // 全局变量
        let dataManager = new DataManager();
        let statsAnalyzer = new StatsAnalyzer();
        let chartManager = new ChartManager();
        let projectManager = new ProjectManager();
        let currentData = null;
        let currentTab = 'data_view';
        console.log('Global variables initialized');
        
        // 初始化应用
        function initApp() {
            console.log('Initializing app...');
            createEmptyTable(100, 10);
            initVariableView();
            loadSampleData();
            console.log('App initialized');
        }
        
        // 创建空表格
        function createEmptyTable(rows, cols) {
            const tableHeader = document.getElementById('table_header');
            const tableBody = document.getElementById('table_body');
            
            tableHeader.innerHTML = '';
            tableBody.innerHTML = '';
            
            const headerRow = document.createElement('tr');
            const rowHeaderTh = document.createElement('th');
            rowHeaderTh.textContent = '';
            rowHeaderTh.className = 'row-header';
            headerRow.appendChild(rowHeaderTh);
            
            for (let i = 1; i <= cols; i++) {
                const th = document.createElement('th');
                const input = document.createElement('input');
                input.type = 'text';
                input.value = `var${i}`;
                input.onchange = function() {
                    updateVariableName(i-1, this.value);
                };
                th.appendChild(input);
                headerRow.appendChild(th);
            }
            tableHeader.appendChild(headerRow);
            
            for (let i = 1; i <= rows; i++) {
                const row = document.createElement('tr');
                
                const rowHeaderTd = document.createElement('td');
                rowHeaderTd.className = 'row-header';
                const rowInput = document.createElement('input');
                rowInput.type = 'text';
                rowInput.value = i;
                rowInput.onchange = function() {
                    updateRowName(i-1, this.value);
                };
                rowHeaderTd.appendChild(rowInput);
                row.appendChild(rowHeaderTd);
                
                for (let j = 1; j <= cols; j++) {
                    const td = document.createElement('td');
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = '';
                    input.onchange = function() {
                        updateCellValue(i-1, j-1, this.value);
                    };
                    td.appendChild(input);
                    row.appendChild(td);
                }
                tableBody.appendChild(row);
            }
        }
        
        // 初始化变量视图
        function initVariableView() {
            const variableTableBody = document.getElementById('variable_table_body');
            variableTableBody.innerHTML = '';
            
            for (let i = 1; i <= 10; i++) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="text" value="var${i}" onchange="updateVariableNameInView(${i-1}, this.value)"></td>
                    <td><select><option value="numeric">数值</option><option value="string">字符串</option><option value="date">日期</option></select></td>
                    <td><input type="number" value="8" min="1"></td>
                    <td><input type="number" value="2" min="0"></td>
                    <td><input type="text" value="变量 ${i}"></td>
                    <td><input type="text" value=""></td>
                    <td><input type="text" value=""></td>
                    <td><input type="number" value="${i}" min="1"></td>
                    <td><select><option value="right">右</option><option value="left">左</option><option value="center">中</option></select></td>
                    <td><select><option value="scale">度量</option><option value="ordinal">有序</option><option value="nominal">名义</option></select></td>
                `;
                variableTableBody.appendChild(row);
            }
        }
        
        // 更新变量名
        function updateVariableName(index, name) {
            const headers = document.querySelectorAll('#table_header th input');
            if (headers[index+1]) {
                headers[index+1].value = name;
            }
            
            const variableRows = document.querySelectorAll('#variable_table_body tr');
            if (variableRows[index]) {
                const input = variableRows[index].querySelector('td:first-child input');
                if (input) {
                    input.value = name;
                }
            }
        }
        
        // 更新变量视图中的变量名
        function updateVariableNameInView(index, name) {
            const headers = document.querySelectorAll('#table_header th input');
            if (headers[index+1]) {
                headers[index+1].value = name;
            }
        }
        
        // 更新行名
        function updateRowName(index, name) {
        }
        
        // 更新单元格值
        function updateCellValue(row, col, value) {
            if (!currentData) {
                currentData = {};
            }
            
            const variableName = document.querySelectorAll('#table_header th input')[col+1].value;
            if (!currentData[variableName]) {
                currentData[variableName] = Array(100).fill('');
            }
            currentData[variableName][row] = value;
        }
        
        // 加载示例数据
        function loadSampleData() {
            const sampleData = {
                'ID': Array.from({length: 100}, (_, i) => i+1),
                '年龄': Array.from({length: 100}, () => Math.floor(Math.random() * 30) + 20),
                '性别': Array.from({length: 100}, () => Math.random() > 0.5 ? '男' : '女'),
                '得分': Array.from({length: 100}, () => Math.floor(Math.random() * 30) + 70),
                '组别': Array.from({length: 100}, () => ['A', 'B', 'C'][Math.floor(Math.random() * 3)]),
                '身高': Array.from({length: 100}, () => (Math.random() * 30 + 150).toFixed(1)),
                '体重': Array.from({length: 100}, () => (Math.random() * 30 + 50).toFixed(1)),
                'BMI': Array.from({length: 100}, () => (Math.random() * 10 + 18).toFixed(2)),
                '成绩': Array.from({length: 100}, () => Math.floor(Math.random() * 40) + 60),
                '排名': Array.from({length: 100}, (_, i) => i+1)
            };
            
            currentData = sampleData;
            updateTableFromData(sampleData);
            updateVariableViewFromData(sampleData);
        }
        
        // 从数据更新表格
        function updateTableFromData(data) {
            const variables = Object.keys(data);
            const rowCount = data[variables[0]].length;
            
            const tableHeader = document.getElementById('table_header');
            tableHeader.innerHTML = '';
            
            const headerRow = document.createElement('tr');
            const rowHeaderTh = document.createElement('th');
            rowHeaderTh.textContent = '';
            rowHeaderTh.className = 'row-header';
            headerRow.appendChild(rowHeaderTh);
            
            variables.forEach((variable, index) => {
                const th = document.createElement('th');
                const input = document.createElement('input');
                input.type = 'text';
                input.value = variable;
                input.onchange = function() {
                    updateVariableName(index, this.value);
                };
                th.appendChild(input);
                headerRow.appendChild(th);
            });
            tableHeader.appendChild(headerRow);
            
            const tableBody = document.getElementById('table_body');
            tableBody.innerHTML = '';
            
            for (let i = 0; i < rowCount; i++) {
                const row = document.createElement('tr');
                
                const rowHeaderTd = document.createElement('td');
                rowHeaderTd.className = 'row-header';
                const rowInput = document.createElement('input');
                rowInput.type = 'text';
                rowInput.value = i+1;
                rowInput.onchange = function() {
                    updateRowName(i, this.value);
                };
                rowHeaderTd.appendChild(rowInput);
                row.appendChild(rowHeaderTd);
                
                variables.forEach(variable => {
                    const td = document.createElement('td');
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = data[variable][i];
                    input.onchange = function() {
                        updateCellValue(i, variables.indexOf(variable), this.value);
                    };
                    td.appendChild(input);
                    row.appendChild(td);
                });
                tableBody.appendChild(row);
            }
            
            document.getElementById('status_variables').textContent = variables.length;
            document.getElementById('status_cases').textContent = rowCount;
            document.getElementById('variable_count').value = variables.length;
            document.getElementById('case_count').value = rowCount;
        }
        
        // 从数据更新变量视图
        function updateVariableViewFromData(data) {
            const variables = Object.keys(data);
            const variableTableBody = document.getElementById('variable_table_body');
            variableTableBody.innerHTML = '';
            
            variables.forEach((variable, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="text" value="${variable}" onchange="updateVariableNameInView(${index}, this.value)"></td>
                    <td><select><option value="numeric">数值</option><option value="string">字符串</option><option value="date">日期</option></select></td>
                    <td><input type="number" value="8" min="1"></td>
                    <td><input type="number" value="2" min="0"></td>
                    <td><input type="text" value="${variable}"></td>
                    <td><input type="text" value=""></td>
                    <td><input type="text" value=""></td>
                    <td><input type="number" value="${index+1}" min="1"></td>
                    <td><select><option value="right">右</option><option value="left">左</option><option value="center">中</option></select></td>
                    <td><select><option value="scale">度量</option><option value="ordinal">有序</option><option value="nominal">名义</option></select></td>
                `;
                variableTableBody.appendChild(row);
            });
        }
        
        // 切换标签页
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.style.display = 'none');
            
            document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
            document.getElementById(tabId).style.display = 'block';
            currentTab = tabId;
        }
        
        // 切换到变量视图
        function switchToVariableView() {
            switchTab('variable_view');
        }
        
        // 切换到数据视图
        function switchToDataView() {
            switchTab('data_view');
        }
        
        // 生成变量选项
        function generateVariableOptions() {
            if (!currentData) {
                return '';
            }
            return Object.keys(currentData).map(varName => `<option value="${varName}">${varName}</option>`).join('');
        }
        
        // 显示分析面板
        function showAnalysis(section) {
            const analysisPanel = document.getElementById('analysis_panel');
            const analysisContent = document.getElementById('analysis_content');
            
            analysisPanel.classList.add('active');
            
            let content = '';
            switch (section) {
                case 'descriptive':
                    content = `
                        <h3 style="margin-bottom: 20px; color: var(--text-primary);">描述性统计</h3>
                        <div style="margin-bottom: 20px;">
                            <label style="display: block; margin-bottom: 8px; color: var(--text-secondary);">选择变量:</label>
                            <select multiple style="width: 100%; height: 120px; padding: 8px; border: 1px solid var(--border); border-radius: var(--border-radius);">
                                ${generateVariableOptions()}
                            </select>
                        </div>
                        <div style="margin-bottom: 20px;">
                            <label style="display: block; margin-bottom: 8px; color: var(--text-secondary);">统计量:</label>
                            <div style="display: flex; flex-wrap: wrap; gap: 16px;">
                                <label style="display: flex; align-items: center; gap: 6px;"><input type="checkbox" checked> 均值</label>
                                <label style="display: flex; align-items: center; gap: 6px;"><input type="checkbox" checked> 标准差</label>
                                <label style="display: flex; align-items: center; gap: 6px;"><input type="checkbox" checked> 最小值</label>
                                <label style="display: flex; align-items: center; gap: 6px;"><input type="checkbox" checked> 最大值</label>
                                <label style="display: flex; align-items: center; gap: 6px;"><input type="checkbox"> 偏度</label>
                                <label style="display: flex; align-items: center; gap: 6px;"><input type="checkbox"> 峰度</label>
                            </div>
                        </div>
                        <button class="btn btn-primary" onclick="runDescriptiveAnalysis()">运行分析</button>
                    `;
                    break;
                default:
                    content = `<h3 style="margin-bottom: 20px;">${section}</h3><p style="color: var(--text-secondary);">此功能正在开发中...</p>`;
            }
            
            analysisContent.innerHTML = content;
        }
        
        // 关闭分析面板
        function closeAnalysisPanel() {
            const analysisPanel = document.getElementById('analysis_panel');
            analysisPanel.classList.remove('active');
        }
        
        // 运行描述性分析
        async function runDescriptiveAnalysis() {
            if (!currentData) {
                alert('请先加载数据');
                return;
            }
            
            const variables = Object.keys(currentData);
            document.getElementById('analysis_content').innerHTML = '<div class="loading"><div class="loading-spinner"></div><span style="color: var(--text-secondary);">正在计算...</span></div>';
            
            try {
                const response = await statsAnalyzer.descriptiveStats(variables);
                
                if (response.status === 'success') {
                    const result = response.data;
                    
                    let html = '<h3 style="margin-bottom: 20px;">描述性统计结果</h3>';
                    html += '<table class="result-table">';
                    html += '<tr><th>统计量</th>';
                    variables.forEach(varName => {
                        html += `<th>${varName}</th>`;
                    });
                    html += '</tr>';
                    
                    const stats = ['count', 'mean', 'std', 'min', '25%', '50%', '75%', 'max'];
                    stats.forEach(stat => {
                        html += `<tr><td>${stat}</td>`;
                        variables.forEach(varName => {
                            if (result[varName] && result[varName][stat] !== undefined) {
                                html += `<td>${result[varName][stat].toFixed(2)}</td>`;
                            } else {
                                html += '<td>-</td>';
                            }
                        });
                        html += '</tr>';
                    });
                    html += '</table>';
                    
                    document.getElementById('analysis_content').innerHTML = html;
                    updateOutputView(html);
                } else {
                    document.getElementById('analysis_content').innerHTML = `<div class="message error">${response.message}</div>`;
                }
            } catch (error) {
                console.error('Error running descriptive analysis:', error);
                document.getElementById('analysis_content').innerHTML = '<div class="message error">运行分析时出错</div>';
            }
        }
        
        // 更新输出视图
        function updateOutputView(content) {
            const outputContent = document.getElementById('output_content');
            outputContent.innerHTML += `<div style="margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border);">${content}</div>`;
        }
        
        // 清除输出
        function clearOutput() {
            document.getElementById('output_content').innerHTML = '<p style="text-align: center; color: var(--text-tertiary); margin-top: 60px; font-size: 14px;">输出将显示在这里</p>';
        }
        
        // 菜单函数
        function newProject() {
            if (confirm('确定要新建项目吗？当前未保存的数据将会丢失。')) {
                createEmptyTable(100, 10);
                initVariableView();
                currentData = null;
                alert('新项目已创建');
            }
        }
        
        function openProject() {
            alert('打开项目功能正在开发中');
        }
        
        function saveProject() {
            const datasetName = document.getElementById('dataset_name').value;
            alert(`项目 "${datasetName}" 已保存`);
        }
        
        function exportData() {
            alert('导出数据功能正在开发中');
        }
        
        function importData() {
            alert('导入数据功能正在开发中');
        }
        
        function exitApp() {
            if (confirm('确定要退出应用吗？')) {
                alert('应用将退出');
            }
        }
        
        function cutData() {
            alert('剪切功能正在开发中');
        }
        
        function copyData() {
            alert('复制功能正在开发中');
        }
        
        function pasteData() {
            alert('粘贴功能正在开发中');
        }
        
        function clearData() {
            if (confirm('确定要清除所有数据吗？')) {
                createEmptyTable(100, 10);
                currentData = null;
                alert('数据已清除');
            }
        }
        
        function toggleProperties() {
            const propertiesPanel = document.getElementById('properties_panel');
            propertiesPanel.classList.toggle('active');
        }
        
        function resetLayout() {
            document.getElementById('properties_panel').classList.add('active');
            alert('布局已重置');
        }
        
        function defineVariables() {
            switchTab('variable_view');
        }
        
        function transformData() {
            showAnalysis('transform');
        }
        
        function cleanData() {
            showAnalysis('data_prep');
        }
        
        function showSettings() {
            alert('设置功能正在开发中');
        }
        
        function showHelp() {
            alert('帮助文档正在开发中');
        }
        
        function showTutorial() {
            alert('教程正在开发中');
        }
        
        function showAbout() {
            alert('AxaltyX 版本 1.0.0\n专业统计分析软件\n版权所有 © 2026 TBJ114');
        }
        
        function runAnalysis() {
            showAnalysis('descriptive');
        }
        
        // 初始化应用
        window.onload = function() {
            console.log('Initializing app...');
            initApp();
            console.log('App initialized');
        };
    </script>
</body>
</html>
